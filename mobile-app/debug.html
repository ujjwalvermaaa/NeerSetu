<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeerSetu Debug</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #2196F3;
            color: white;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .status {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .debug {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .error {
            color: #ffcdd2;
            background-color: #d32f2f;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">NeerSetu Debug</div>
        <div class="subtitle">Smart Community Health Monitoring</div>
        <div class="status">Debug HTML is working! 🎉</div>
        <div class="debug">If you can see this, the web server is working</div>
        <div class="debug">Now testing React Native Web...</div>
        <div id="react-app"></div>
        <div class="error" id="error-message" style="display: none;">
            React Native Web failed to load. Check console for errors.
        </div>
    </div>

    <script>
        console.log('Debug HTML loaded');
        
        // Test if we can access the React Native Web bundle
        fetch('/static/js/bundle.js')
            .then(response => {
                console.log('Bundle response:', response.status);
                if (response.ok) {
                    console.log('Bundle loaded successfully');
                } else {
                    console.error('Bundle failed to load:', response.status);
                    document.getElementById('error-message').style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Bundle fetch error:', error);
                document.getElementById('error-message').style.display = 'block';
            });
    </script>
</body>
</html>
