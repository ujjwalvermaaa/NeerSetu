version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: neersetu-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: neersetu
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - neersetu-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neersetu-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/neersetu?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_here
      ML_SERVICE_URL: http://ml-service:8000
      ALERTS_SERVICE_URL: http://alerts-service:5001
    depends_on:
      - mongodb
      - ml-service
    volumes:
      - ./uploads:/app/uploads
    networks:
      - neersetu-network

  # ML Service
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: neersetu-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://backend:5000
      MODEL_PATH: /app/models/outbreak_model.joblib
    volumes:
      - ./ml-service/models:/app/models
      - ./Datasets:/app/data
    networks:
      - neersetu-network

  # Alert Service
  alerts-service:
    build:
      context: ./alerts-service
      dockerfile: Dockerfile
    container_name: neersetu-alerts-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/neersetu?authSource=admin
      BACKEND_URL: http://backend:5000
      TWILIO_ACCOUNT_SID: your_twilio_account_sid
      TWILIO_AUTH_TOKEN: your_twilio_auth_token
      TWILIO_PHONE_NUMBER: your_twilio_phone_number
      WHATSAPP_TOKEN: your_whatsapp_business_token
      WHATSAPP_PHONE_NUMBER_ID: your_whatsapp_phone_number_id
      FIREBASE_PROJECT_ID: your_firebase_project_id
      FIREBASE_PRIVATE_KEY: your_firebase_private_key
      FIREBASE_CLIENT_EMAIL: your_firebase_client_email
    depends_on:
      - mongodb
      - backend
    networks:
      - neersetu-network

  # Dashboard (React)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: neersetu-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_ML_URL: http://localhost:8000
      REACT_APP_ALERTS_URL: http://localhost:5001
    depends_on:
      - backend
    networks:
      - neersetu-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: neersetu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - dashboard
    networks:
      - neersetu-network

volumes:
  mongodb_data:
    driver: local

networks:
  neersetu-network:
    driver: bridge
